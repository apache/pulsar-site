name: Synchronize Website Content
description: Synchronize website content from the main repo
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: apache/pulsar
        path: tmp/pulsar
    - name: Install poetry
      run: pipx install poetry
      shell: bash
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'poetry'
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: corretto
        java-version: 21
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v5
    - name: Build pulsar artifacts and export classpath
      working-directory: tmp/pulsar
      run: |
        ./gradlew \
          assemble \
          :distribution:pulsar-server-distribution:exportClasspath \
          :distribution:pulsar-shell-distribution:exportClasspath \
          --no-configuration-cache \
          --no-daemon
      shell: bash
    - name: Update generated docs
      working-directory: tools/pytools
      run: |
        poetry install
        poetry run bin/reference-doc-generator.py --master-path=$GITHUB_WORKSPACE/tmp/pulsar
        poetry run bin/rest-apidoc-generator.py --master-path=$GITHUB_WORKSPACE/tmp/pulsar
      shell: bash
    - name: Remove stray log lines from generated reference docs
      run: |
        find static/reference -name '*.md' -print0 | xargs -0 sed -i -E \
          '/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2},[0-9]{3}[+-][0-9]{4} \[[^]]*\] +(INFO|WARN|ERROR|DEBUG|TRACE|FATAL) /d'
      shell: bash
    - name: Commit and push updated docs
      working-directory: tools/pytools
      run: poetry run bin/site-updater.py --master-path=$GITHUB_WORKSPACE/tmp/pulsar
      shell: bash
